# Dependabot consumer template — copy-paste from teelr/dev-platform.
#
# WHAT THIS IS: the outbound half of the cross-repo comms standard
# (docs/CROSS-REPO-COMMS.md). Instead of the dependency hand-relaying a
# release-broadcast doc into your repo's inbox, you watch the dependency's
# GitHub Releases here and Dependabot opens a PR when a new version ships.
#
# HOW TO ADOPT (opt-in, per consumer repo):
#   1. Copy this file to .github/dependabot.yml in your repo (NOT this path).
#   2. Keep only the `updates:` blocks that match your stack; delete the rest.
#   3. Adjust `directory` to where your manifest lives (usually "/").
#   4. Commit. Dependabot runs on GitHub's schedule and opens version-bump PRs.
#
# Notes:
#   - This is a TEMPLATE. dev-platform itself does not run it — it lives under
#     extensions/github-actions/ next to dev-platform-gate.yml, not at
#     .github/dependabot.yml.
#   - Dependabot tracks dependencies declared in your manifest (requirements.txt,
#     pyproject.toml, package.json, go.mod, the `uses:` pins in your workflows).
#     A dependency pinned by a Git tag/branch is bumped when you reference it as
#     a versioned requirement; a plain Git URL with no version constraint is not
#     auto-bumped — pin to a release tag to get the PRs.
#   - LOCALLY-INSTALLED dependencies are NOT trackable. A package installed
#     editable (`pip install -e`), from a vendored wheel, or otherwise not
#     published to the index Dependabot reads cannot be resolved — Dependabot
#     errors on it instead of skipping. `ignore` it (see the pip block below) and
#     keep its pin a manual bump. For Rich's harness consumers this is
#     `kermit-harness` (local editable in PA; vendored wheel in Keystone — not on
#     PyPI for any consumer). Confirmed by the PA adoption, 2026-06-28.

version: 2
updates:
  # --- Python consumers (kermit-pa, keystone-python, ...) -------------------
  # Bumps PyPI + versioned Git dependencies in your Python manifest.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # Ignore dependencies Dependabot can't resolve because they're installed
    # locally (editable / vendored wheel / not on the index). Without this,
    # Dependabot errors on them instead of skipping. Their pin stays a manual
    # bump. Uncomment + set to your locally-installed dep — for harness
    # consumers that's kermit-harness (not on PyPI for any consumer):
    # ignore:
    #   - dependency-name: "kermit-harness"

  # --- GitHub Actions pins --------------------------------------------------
  # Bumps the `uses: teelr/dev-platform/...@vX.Y` pin in your workflows (and any
  # other action pins) when a new dev-platform release tag is published. This is
  # how the dev-platform-gate.yml consumer template stays current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # --- Node consumers (OPIE, ...) — uncomment if your repo uses npm ----------
  # - package-ecosystem: "npm"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
  #   open-pull-requests-limit: 5
  #   labels:
  #     - "dependencies"

  # --- Go consumers — uncomment if your repo uses go modules -----------------
  # - package-ecosystem: "gomod"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
  #   labels:
  #     - "dependencies"
